<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Sindhi Zaika Achaar</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body style="background:var(--charcoal); min-height:100vh; display:flex; align-items:center; justify-content:center;">
<div style="width:100%; max-width:440px; padding:24px;">
  <div style="text-align:center; margin-bottom:32px;">
    <img src="logo.png" alt="Logo" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin:0 auto 16px; border:3px solid var(--saffron);">
    <h1 style="font-family:var(--font-head); font-size:1.6rem; color:#fff; margin-bottom:6px;">Admin Panel</h1>
    <p style="color:#888; font-size:.88rem;">Sindhi Zaika Achaar</p>
  </div>
  <div style="background:#fff; border-radius:var(--radius-lg); padding:36px 32px; box-shadow:var(--shadow-lg);">
    <h2 style="font-family:var(--font-head); font-size:1.4rem; margin-bottom:8px;">Sign In</h2>
    <p style="font-size:.85rem; color:var(--mid-grey); margin-bottom:24px;">Access restricted to administrators only.</p>
    <div id="adminLoginAlert"></div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="aEmail" placeholder="admin@sindhizaika.pk">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="aPass" placeholder="Password">
      </div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="adminLogin()" style="margin-top:8px;">Sign In to Admin</button>
    <div style="text-align:center; margin-top:20px; font-size:.82rem; color:var(--mid-grey);">
      Default: <strong>admin@sindhizaika.pk</strong> / <strong>admin123</strong>
    </div>
  </div>
  <div style="text-align:center; margin-top:20px;">
    <a href="index.html" style="color:#888; font-size:.85rem;">Back to Store</a>
  </div>
</div>
<script src="script.js"></script>
<script>
function adminLogin() {
  const email = document.getElementById('aEmail').value.trim();
  const pass = document.getElementById('aPass').value;
  const users = getUsers();
  const user = users.find(u => u.email === email && u.password === pass && u.role === 'admin');
  if (!user) {
    document.getElementById('adminLoginAlert').innerHTML = '<div class="alert alert-danger">Invalid credentials or not an admin account.</div>';
    return;
  }
  setCurrentUser(user);
  window.location.href = 'admin-dashboard.html';
}
document.getElementById('aPass').addEventListener('keydown', e => { if(e.key==='Enter') adminLogin(); });
document.addEventListener('DOMContentLoaded', () => { if(isAdmin()) window.location.href='admin-dashboard.html'; });
</script>
</body>
</html>
